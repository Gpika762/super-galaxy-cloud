<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Galaxy Cloud Pro</title>
    <style>
        :root { 
            --aero-blue: #0094ff; 
            --aero-glow: rgba(0, 148, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1); 
            --error: #ff4444;
            --success: #00ff88;
        }
        
        body { 
            background: #000; 
            background-image: 
                radial-gradient(circle at 20% 30%, #001a33 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #003366 0%, #000 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 25px; padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }

        /* --- PANTALLA DE MANTENIMIENTO --- */
        #maint-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .maint-icon { font-size: 50px; margin-bottom: 15px; animation: rotate 2s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h1 { text-align: center; font-weight: 200; letter-spacing: 4px; margin: 0 0 20px; font-size: 22px; text-shadow: 0 0 15px var(--aero-glow); }
        h1 span { font-weight: 800; color: var(--aero-blue); }

        .storage-card {
            background: rgba(0,0,0,0.3); border-radius: 15px;
            padding: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .storage-info { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 5px; }
        .storage-bar { width: 100%; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden; }
        .storage-fill { width: 0%; height: 100%; background: var(--aero-blue); transition: 1s ease-in-out; }

        .upload-card {
            background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(255,255,255,0.3);
            border-radius: 20px; padding: 30px 10px; text-align: center;
            transition: 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .upload-card:active { transform: scale(0.98); background: rgba(255,255,255,0.08); }
        .upload-card span { font-size: 40px; display: block; filter: drop-shadow(0 0 10px var(--aero-blue)); }

        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; padding-right: 5px; }
        .file-item {
            background: rgba(255,255,255,0.07); border-radius: 15px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1); animation: fadeIn 0.4s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-info { display: flex; align-items: center; gap: 10px; width: 65%; }
        .file-icon { font-size: 24px; }
        .file-name { font-size: 13px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-meta { font-size: 10px; color: #888; }

        .actions { display: flex; gap: 8px; }
        .btn-dl { background: var(--aero-blue); color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; transition: 0.2s; }
        .btn-dl:active { background: #007acc; }
        
        .btn-del { 
            background: rgba(255, 68, 68, 0.2); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.3); 
            padding: 8px 12px; border-radius: 8px; font-size: 10px; cursor: pointer; font-weight: bold;
        }
        .btn-del:active { background: var(--error); color: white; }

        #progress-container { display: none; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="maint-overlay">
        <div class="maint-icon">⚙️</div>
        <h3 style="color:var(--error); margin:0; letter-spacing: 2px;">MANTENIMIENTO</h3>
        <p style="font-size:11px; color:#aaa; padding:15px;">Motores en revisión.<br>La órbita abrirá pronto.</p>
        <button onclick="document.getElementById('maint-overlay').style.display='none'" style="background:transparent; border:1px solid #333; color:#555; font-size:9px; border-radius:5px; padding:5px;">Cerrar aviso</button>
    </div>

    <h1>GALAXY CLOUD <span>PRO</span></h1>

    <div class="storage-card">
        <div class="storage-info">
            <span>ESTADO DEL DISCO</span>
            <span id="storage-txt">Calculando...</span>
        </div>
        <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
    </div>

    <div id="drop-zone" class="upload-card" onclick="document.getElementById('file-input').click()">
        <span id="rocket-icon">🛸</span>
        <p id="status-main" style="margin: 10px 0 0; font-size: 12px; color: #ccc;">Subir archivo</p>
        <input type="file" id="file-input" style="display: none;">
        
        <div id="progress-container">
            <div id="status-percent" style="font-size: 10px; margin-bottom: 5px; color:#aaa;">Transfiriendo...</div>
            <div class="storage-bar"><div class="storage-fill" id="bar" style="width:0%"></div></div>
        </div>
    </div>

    <div id="file-list" class="file-list"></div>
</div>

<script>
    var isMaint = false;

    function getIcon(name) {
        var ext = name.split('.').pop().toLowerCase();
        if(ext === 'apk') return '🤖';
        if(['jpg','jpeg','png','gif','webp'].indexOf(ext) > -1) return '🖼️';
        if(['mp3','wav','ogg'].indexOf(ext) > -1) return '🎵';
        if(['mp4','3gp','mov'].indexOf(ext) > -1) return '🎬';
        return '📄';
    }

    function cargarArchivos() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'api/files', true);
        
        // Token DELTARUNEGOD para saltar bloqueos si eres tú
        var token = localStorage.getItem('app_secure_key');
        if(token) xhr.setRequestHeader('x-admin-auth', token);

        xhr.onload = function() {
            if (xhr.status === 200) {
                var files = JSON.parse(xhr.responseText);
                dibujarLista(files);
            } else if (xhr.status === 503) {
                document.getElementById('maint-overlay').style.display = 'flex';
                isMaint = true;
            }
        };
        xhr.send();
    }

    function dibujarLista(files) {
        var fileListDiv = document.getElementById('file-list');
        fileListDiv.innerHTML = '';

        if(files.length === 0) {
            fileListDiv.innerHTML = '<p style="text-align:center; color:#444; font-size:12px; margin-top:20px;">Nube vacía.</p>';
        }

        files.forEach(function(f) {
            fileListDiv.innerHTML += `
                <div class="file-item">
                    <div class="file-info">
                        <span class="file-icon">${getIcon(f.name)}</span>
                        <div>
                            <div class="file-name">${f.name}</div>
                            <div class="file-meta">${f.size}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <a href="${f.url}" class="btn-dl" target="_blank">Bajar</a>
                        <button class="btn-del" onclick="eliminar('${f.id}')">X</button>
                    </div>
                </div>`;
        });
        actualizarEspacio(files.length);
    }

    function eliminar(id) {
        if(!confirm("¿Borrar permanentemente?")) return;
        var xhr = new XMLHttpRequest();
        // El id ya viene como 'folder/nombre'
        xhr.open('DELETE', 'api/files/' + id, true);
        
        var token = localStorage.getItem('app_secure_key');
        if(token) xhr.setRequestHeader('x-admin-auth', token);
        
        xhr.onload = function() {
            if(xhr.status === 200) { 
                cargarArchivos(); 
            } else { 
                alert("Error: No se pudo eliminar."); 
            }
        };
        xhr.send();
    }

    function actualizarEspacio(numFiles) {
        // Simulación: cada archivo ocupa aprox 1.5% del espacio free
        var porc = (numFiles * 1.5); 
        if(porc > 100) porc = 100;
        document.getElementById('storage-fill').style.width = porc + '%';
        document.getElementById('storage-txt').innerHTML = porc.toFixed(1) + '% / 25GB';
    }

    document.getElementById('file-input').onchange = function() {
        var file = this.files[0];
        if(!file) return;

        var formData = new FormData();
        formData.append('archivo', file);

        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('status-main').style.display = 'none';

        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'api/upload', true);
        
        var token = localStorage.getItem('app_secure_key');
        if(token) xhr.setRequestHeader('x-admin-auth', token);

        xhr.upload.onprogress = function(e) {
            if (e.lengthComputable) {
                var p = (e.loaded / e.total) * 100;
                document.getElementById('bar').style.width = p + '%';
                document.getElementById('status-percent').innerText = 'Subiendo: ' + Math.round(p) + '%';
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) { 
                location.reload(); 
            } else { 
                alert("Subida fallida. Sistema en mantenimiento."); 
                location.reload();
            }
        };
        xhr.send(formData);
    };

    cargarArchivos();
</script>

</body>
</html>
