<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Galaxy Cloud Pro</title>
    <style>
        :root { 
            --aero-blue: #0094ff; 
            --aero-glow: rgba(0, 148, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1); 
            --error: #ff4444;
            --success: #00ff88;
        }
        
        body { 
            background: #000; 
            background-image: 
                radial-gradient(circle at 20% 30%, #001a33 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #003366 0%, #000 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 25px; padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }

        /* --- PANEL ADMIN (TRANQUILO) --- */
        #admin-panel {
            display: none; background: rgba(0,0,0,0.4);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
            border: 1px solid rgba(0, 148, 255, 0.3);
            font-size: 12px;
        }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        /* Switch Estilo Samsung */
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--aero-blue); }
        input:checked + .slider:before { transform: translateX(16px); }
        input:disabled + .slider { opacity: 0.3; cursor: not-allowed; }

        #maint-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        h1 { text-align: center; font-weight: 200; letter-spacing: 4px; margin: 0 0 20px; font-size: 22px; text-shadow: 0 0 15px var(--aero-glow); }
        h1 span { font-weight: 800; color: var(--aero-blue); }

        .storage-card {
            background: rgba(0,0,0,0.3); border-radius: 15px;
            padding: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .storage-info { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 5px; }
        .storage-bar { width: 100%; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden; }
        .storage-fill { width: 0%; height: 100%; background: var(--aero-blue); transition: 1s ease-in-out; }

        .upload-card {
            background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(255,255,255,0.3);
            border-radius: 20px; padding: 30px 10px; text-align: center;
            transition: 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .file-item {
            background: rgba(255,255,255,0.07); border-radius: 15px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .file-info { display: flex; align-items: center; gap: 10px; width: 65%; }
        .file-name { font-size: 13px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .actions { display: flex; gap: 8px; }
        .btn-dl { background: var(--aero-blue); color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .btn-del { background: rgba(255, 68, 68, 0.2); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.3); padding: 8px 12px; border-radius: 8px; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div id="admin-panel">
        <div class="admin-row">
            <span>🛡️ Mantenimiento Manual</span>
            <label class="switch">
                <input type="checkbox" id="maint-switch" onchange="toggleMaint(this.checked)">
                <span class="slider"></span>
            </label>
        </div>
        <div id="timer-ui" style="margin-bottom:10px;">
            <input type="number" id="m-mins" value="15" style="width:40px; background:transparent; border:1px solid #444; color:white; border-radius:5px; font-size:11px;">
            <button onclick="setTimer()" style="background:var(--aero-blue); border:none; color:white; font-size:10px; padding:4px 8px; border-radius:5px; cursor:pointer;">Poner Temporizador</button>
        </div>
        <div id="timer-status" style="font-size:10px; color:var(--success); margin-bottom:10px;"></div>
        <div style="font-size:10px; border-top:1px solid #222; padding-top:10px; opacity:0.8;">
            📡 Último: <span id="last-dev">Cargando...</span> | 📦 Archivos: <span id="file-count">0</span>
        </div>
    </div>

    <div id="maint-overlay">
        <div class="maint-icon">⚙️</div>
        <h3 style="color:var(--error); margin:0;">MANTENIMIENTO</h3>
        <p style="font-size:11px; color:#aaa; padding:15px;">Órbita cerrada temporalmente.</p>
    </div>

    <h1>GALAXY CLOUD <span>PRO</span></h1>

    <div class="storage-card">
        <div class="storage-info">
            <span>ESTADO DEL DISCO</span>
            <span id="storage-txt">0% / 25GB</span>
        </div>
        <div class="storage-bar"><div class="storage-fill" id="storage-fill"></div></div>
    </div>

    <div id="drop-zone" class="upload-card" onclick="document.getElementById('file-input').click()">
        <span>🛸</span>
        <p id="status-main" style="margin: 10px 0 0; font-size: 12px; color: #ccc;">Subir archivo</p>
        <input type="file" id="file-input" style="display: none;">
        <div id="progress-container" style="display:none; margin-top:10px;">
            <div id="status-percent" style="font-size: 10px; margin-bottom: 5px; color:#aaa;">0%</div>
            <div class="storage-bar"><div class="storage-fill" id="bar" style="width:0%"></div></div>
        </div>
    </div>

    <div id="file-list" class="file-list"></div>
</div>

<script>
    const token = localStorage.getItem('app_secure_key') || "";

    function getIcon(name) {
        var ext = name.split('.').pop().toLowerCase();
        if(ext === 'apk') return '🤖';
        if(['jpg','jpeg','png','gif','webp'].indexOf(ext) > -1) return '🖼️';
        if(['mp3','wav','ogg'].indexOf(ext) > -1) return '🎵';
        if(['mp4','3gp','mov'].indexOf(ext) > -1) return '🎬';
        return '📄';
    }

    function cargarArchivos() {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', 'api/files', true);
        if(token) xhr.setRequestHeader('x-admin-auth', token);

        xhr.onload = function() {
            if (xhr.status === 200) {
                var files = JSON.parse(xhr.responseText);
                dibujarLista(files);
                
                // Si eres admin, mostramos el panel y actualizamos datos de las cabeceras
                if(xhr.getResponseHeader('x-is-admin') === 'true') {
                    document.getElementById('admin-panel').style.display = 'block';
                    actualizarStatusAdmin();
                }
            } else if (xhr.status === 503) {
                document.getElementById('maint-overlay').style.display = 'flex';
            }
        };
        xhr.send();
    }

    function actualizarStatusAdmin() {
        fetch(`/api/admin/control?token=${token}`)
        .then(r => r.json())
        .then(data => {
            const sw = document.getElementById('maint-switch');
            const tStatus = document.getElementById('timer-status');
            
            if(data.expira !== "Manual") {
                sw.disabled = true;
                sw.checked = true;
                tStatus.innerText = "⏳ Bloqueado hasta: " + data.expira;
            } else {
                sw.disabled = false;
                sw.checked = data.mantenimiento;
                tStatus.innerText = "";
            }
            document.getElementById('last-dev').innerText = data.dispositivo;
        });
    }

    function toggleMaint(val) {
        const accion = val ? 'on' : 'off';
        fetch(`/api/admin/control?token=${token}&accion=${accion}`).then(() => cargarArchivos());
    }

    function setTimer() {
        const mins = document.getElementById('m-mins').value;
        fetch(`/api/admin/control?token=${token}&accion=timer&minutos=${mins}`).then(() => cargarArchivos());
    }

    function dibujarLista(files) {
        var list = document.getElementById('file-list');
        list.innerHTML = files.length ? '' : '<p style="text-align:center; color:#444; font-size:12px;">Nube vacía.</p>';
        files.forEach(f => {
            list.innerHTML += `
                <div class="file-item">
                    <div class="file-info">
                        <span style="font-size:20px">${getIcon(f.name)}</span>
                        <div style="overflow:hidden">
                            <div class="file-name">${f.name}</div>
                            <div style="font-size:9px; color:#666">${f.size}</div>
                        </div>
                    </div>
                    <div class="actions">
                        <a href="${f.url}" class="btn-dl" target="_blank">Bajar</a>
                        <button class="btn-del" onclick="eliminar('${f.id}')">X</button>
                    </div>
                </div>`;
        });
        document.getElementById('file-count').innerText = files.length;
        var p = Math.min(files.length * 1.5, 100);
        document.getElementById('storage-fill').style.width = p + '%';
        document.getElementById('storage-txt').innerText = p.toFixed(1) + '% / 25GB';
    }

    function eliminar(id) {
        if(!confirm("¿Eliminar?")) return;
        var xhr = new XMLHttpRequest();
        xhr.open('DELETE', 'api/files/' + id, true);
        if(token) xhr.setRequestHeader('x-admin-auth', token);
        xhr.onload = () => cargarArchivos();
        xhr.send();
    }

    document.getElementById('file-input').onchange = function() {
        var file = this.files[0];
        if(!file) return;
        var fd = new FormData(); fd.append('archivo', file);
        document.getElementById('progress-container').style.display = 'block';
        document.getElementById('status-main').style.display = 'none';
        var xhr = new XMLHttpRequest();
        xhr.open('POST', 'api/upload', true);
        if(token) xhr.setRequestHeader('x-admin-auth', token);
        xhr.upload.onprogress = e => {
            var p = (e.loaded / e.total) * 100;
            document.getElementById('bar').style.width = p + '%';
            document.getElementById('status-percent').innerText = Math.round(p) + '%';
        };
        xhr.onload = () => location.reload();
        xhr.send(fd);
    };

    setInterval(cargarArchivos, 10000); // Auto-update cada 10s
    cargarArchivos();
</script>
</body>
</html>
