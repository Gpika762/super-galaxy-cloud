<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Galaxy Cloud Pro</title>
    <style>
        :root { 
            --aero-blue: #0094ff; 
            --aero-glow: rgba(0, 148, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1); 
            --error: #ff4444;
            --success: #00ff88;
        }
        
        body { 
            background: #000; 
            background-image: 
                radial-gradient(circle at 20% 30%, #001a33 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #003366 0%, #000 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 25px; padding: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            position: relative; overflow: hidden;
        }

        /* --- PANEL ADMIN --- */
        #admin-panel {
            display: none; background: rgba(0,0,0,0.4);
            border-radius: 20px; padding: 15px; margin-bottom: 20px;
            border: 1px solid rgba(0, 148, 255, 0.3);
            font-size: 12px;
        }
        .admin-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        
        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--aero-blue); }
        input:checked + .slider:before { transform: translateX(16px); }

        #maint-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }

        h1 { text-align: center; font-weight: 200; letter-spacing: 4px; margin: 0 0 20px; font-size: 22px; text-shadow: 0 0 15px var(--aero-glow); }
        h1 span { font-weight: 800; color: var(--aero-blue); }

        .storage-card {
            background: rgba(0,0,0,0.3); border-radius: 15px;
            padding: 12px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.05);
        }
        .storage-info { display: flex; justify-content: space-between; font-size: 10px; color: #aaa; margin-bottom: 5px; }
        .storage-bar { width: 100%; background: rgba(255,255,255,0.1); height: 4px; border-radius: 2px; overflow: hidden; }
        .storage-fill { width: 0%; height: 100%; background: var(--aero-blue); transition: 1s ease-in-out; }

        .upload-card {
            background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(255,255,255,0.3);
            border-radius: 20px; padding: 30px 10px; text-align: center;
            transition: 0.3s; cursor: pointer; margin-bottom: 20px;
        }
        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .file-item {
            background: rgba(255,255,255,0.07); border-radius: 15px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .file-info { display: flex; align-items: center; gap: 10px; width: 65%; }
        .file-name { font-size: 13px; color: #eee; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .actions { display: flex; gap: 8px; }
        .btn-dl { background: var(--aero-blue); color: white; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; }
        .btn-del { background: rgba(255, 68, 68, 0.2); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.3); padding: 8px 12px; border-radius: 8px; font-size: 10px; cursor: pointer; border: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="admin-panel">
        <div class="admin-row">
            <span>🛡️ Mantenimiento Manual</span>
            <label class="switch">
                <input type="checkbox" id="maint-switch" onchange="toggleMaint(this.checked)">
                <span class="slider"></span>
            </label>
        </div>
        <div id="timer-ui" style="margin-bottom:10px;">
            <input type="number" id="m-mins" value="15" style="width:40px; background:transparent; border:1px solid #444; color:white; border-radius:5px; font-size:11px;">
            <button onclick="setTimer()" style="background:var(--aero-blue); border:none; color:white; font-size:10px; padding:4px 8px; border-radius:5px; cursor:pointer;">Poner Temporizador</button>
        </div>
        <div class="admin-row" style="opacity: 0.7; font-size: 10px;">
            <span>📱 Último dispositivo: <b id="hw-log">Buscando...</b></span>
        </div>
    </div>

    <div id="maint-overlay">
        <h2 style="color: var(--error);">SISTEMA FUERA DE ÓRBITA</h2>
        <p style="font-size: 13px; color: #aaa;">Estamos realizando mantenimiento técnico.<br>Vuelve pronto.</p>
    </div>

    <h1>GALAXY<span>CLOUD</span></h1>

    <div class="storage-card">
        <div class="storage-info">
            <span>Almacenamiento Cloudinary</span>
            <span id="storage-text">Cargando archivos...</span>
        </div>
        <div class="storage-bar"><div class="storage-fill" id="bar-fill"></div></div>
    </div>

    <div class="upload-card" onclick="document.getElementById('file-input').click()">
        <div style="font-size: 30px; margin-bottom: 10px;">☁️</div>
        <div style="font-size: 14px; font-weight: bold;">Subir a la Nube</div>
        <div style="font-size: 10px; color: #888; margin-top: 5px;">Click para seleccionar archivo</div>
        <input type="file" id="file-input" style="display:none" onchange="uploadFile(this.files[0])">
    </div>

    <div class="file-list" id="list"></div>
</div>

<div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:200; justify-content:center; align-items:center; flex-direction:column; backdrop-filter: blur(10px);">
    <div style="background: white; padding: 20px; border-radius: 20px; text-align: center;">
        <h3 style="color: black; margin-top:0;">Escanear para descargar</h3>
        <div id="qr-img-container"></div>
        <button onclick="closeQR()" style="margin-top:15px; padding:10px 20px; border-radius:10px; border:none; background: #333; color:white; cursor:pointer;">Cerrar</button>
    </div>
</div>

<script>
    const API = "/api";
    // Si no tienes el token en localStorage, usa el predeterminado para pruebas
    const TOKEN = localStorage.getItem('admin_token') || "DELTARUNEGOD"; 

    async function loadFiles() {
        try {
            const res = await fetch(`${API}/files`, { headers: { 'x-admin-auth': TOKEN } });
            
            if (res.status === 503) {
                document.getElementById('maint-overlay').style.display = 'flex';
                return;
            } else {
                document.getElementById('maint-overlay').style.display = 'none';
            }

            const files = await res.json();
            
            // Paneles de Admin
            if (res.headers.get('x-is-admin') === 'true') {
                document.getElementById('admin-panel').style.display = 'block';
            }
            document.getElementById('hw-log').innerText = decodeURIComponent(res.headers.get('x-last-device') || "Ninguno");

            const list = document.getElementById('list');
            list.innerHTML = "";

            files.forEach(f => {
                const isImage = f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i);
                const parts = f.id.split('/');
                const folder = parts[0];
                const id = parts[1];

                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `
                    <div class="file-info">
                        <div class="preview" style="width:40px; height:40px; background:#222; border-radius:10px; overflow:hidden; flex-shrink:0; display:flex; align-items:center; justify-content:center;">
                            ${isImage ? `<img src="${API}/preview/${folder}/${id}" style="width:100%; height:100%; object-fit:cover;">` : "📄"}
                        </div>
                        <div class="file-name">${f.name}<br><small style="color:#666">${f.size}</small></div>
                    </div>
                    <div class="actions">
                        <button onclick="showQR('${folder}', '${id}')" style="background:none; border:none; cursor:pointer; font-size:16px;">📱</button>
                        <a href="${API}/download/${folder}/${id}" class="btn-dl">📥</a>
                        <button onclick="deleteFile('${f.id}')" class="btn-del">🗑️</button>
                    </div>
                `;
                list.appendChild(item);
            });

            const perc = Math.min((files.length / 500) * 100, 100);
            document.getElementById('bar-fill').style.width = perc + "%";
            document.getElementById('storage-text').innerText = files.length + " / 500 archivos";

        } catch (e) { console.error("Error en la conexión estelar"); }
    }

    async function showQR(folder, id) {
        const res = await fetch(`${API}/share/qr/${folder}/${id}`, { headers: { 'x-admin-auth': TOKEN } });
        const data = await res.json();
        document.getElementById('qr-img-container').innerHTML = `<img src="${data.qr_url}" style="width:200px; height:200px;">`;
        document.getElementById('qr-modal').style.display = 'flex';
    }

    function closeQR() { document.getElementById('qr-modal').style.display = 'none'; }

    async function deleteFile(id) {
        if (!confirm("¿Borrar de la nube?")) return;
        await fetch(`${API}/files/${id}`, { 
            method: 'DELETE', 
            headers: { 'x-admin-auth': TOKEN } 
        });
        loadFiles();
    }

    async function uploadFile(file) {
        if (!file) return;
        const formData = new FormData();
        formData.append('archivo', file);
        document.querySelector('.upload-card').style.opacity = "0.5";
        
        await fetch(`${API}/upload`, { 
            method: 'POST', 
            body: formData,
            headers: { 'x-admin-auth': TOKEN }
        });
        
        document.querySelector('.upload-card').style.opacity = "1";
        loadFiles();
    }

    async function toggleMaint(checked) {
        const action = checked ? 'on' : 'off';
        await fetch(`${API}/admin/control?token=${TOKEN}&accion=${action}`);
        loadFiles();
    }

    async function setTimer() {
        const mins = document.getElementById('m-mins').value;
        await fetch(`${API}/admin/control?token=${TOKEN}&accion=timer&minutos=${mins}`);
        loadFiles();
    }

    loadFiles();
    setInterval(loadFiles, 25000);
</script>
</body>
</html>
