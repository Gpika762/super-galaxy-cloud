<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Galaxy Cloud Pro</title>
    <style>
        :root { 
            --aero-blue: #0094ff; 
            --aero-glow: rgba(0, 148, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1); 
            --error-red: #ff3333;
        }
        
        body { 
            background: #000; 
            background-image: 
                radial-gradient(circle at 20% 30%, #001a33 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #003366 0%, #000 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; justify-content: center; align-items: flex-start;
        }

        /* Pantalla de Error Crítico (Versión) */
        #version-lock {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            z-index: 9999; justify-content: center; align-items: center; text-align: center; padding: 20px;
        }

        .container {
            width: 100%; max-width: 450px;
            background: var(--glass);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 25px; padding: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            margin-top: 10px;
        }

        h1 { text-align: center; font-weight: 200; letter-spacing: 3px; margin: 0 0 25px; font-size: 22px; text-shadow: 0 0 10px var(--aero-glow); }
        h1 span { font-weight: 800; color: var(--aero-blue); }

        .upload-card {
            background: rgba(255,255,255,0.03); border: 1.5px dashed rgba(255,255,255,0.3);
            border-radius: 20px; padding: 30px 15px; text-align: center;
            transition: 0.3s; cursor: pointer; margin-bottom: 25px;
        }

        .upload-card:active { transform: scale(0.98); background: rgba(0, 148, 255, 0.1); }
        .upload-card span { font-size: 40px; display: block; margin-bottom: 10px; }

        .file-list { display: flex; flex-direction: column; gap: 12px; max-height: 350px; overflow-y: auto; }
        
        .file-item {
            background: rgba(255,255,255,0.07); border-radius: 15px; padding: 12px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .file-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }
        .file-icon { font-size: 24px; }
        .file-name { font-size: 13px; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
        .file-meta { font-size: 10px; color: #888; }

        .btn-download {
            background: linear-gradient(135deg, #0094ff 0%, #004080 100%);
            color: white; border: none; padding: 8px 14px; border-radius: 10px;
            font-weight: 600; text-decoration: none; font-size: 10px; text-transform: uppercase;
        }

        #progress-container { display: none; margin-top: 15px; }
        .progress-bar { width: 100%; background: rgba(255,255,255,0.1); height: 5px; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--aero-blue); transition: width 0.3s; }
    </style>
</head>
<body>

<div id="version-lock">
    <div style="background: rgba(255,50,50,0.1); padding: 30px; border-radius: 30px; border: 1px solid var(--error-red);">
        <h2 style="color: var(--error-red);">SISTEMA OBSOLETO</h2>
        <p id="version-msg">Detectada una nueva versión en la órbita.</p>
        <button onclick="location.reload(true)" style="background: white; color: black; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;">ACTUALIZAR CELULEKE</button>
    </div>
</div>

<div class="container">
    <h1>GALAXY CLOUD <span>PRO</span></h1>

    <div class="upload-card" onclick="document.getElementById('file-input').click()">
        <span>🛸</span>
        <p style="margin: 0; font-size: 12px; color: #ccc;">Toca para orbitar archivo</p>
        <input type="file" id="file-input" style="display: none;">
        
        <div id="progress-container">
            <div class="file-meta" id="status" style="margin-bottom: 5px;">Sincronizando...</div>
            <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
        </div>
    </div>

    <div id="file-list" class="file-list"></div>
</div>

<script>
    const APP_VERSION = "1.6"; // <--- ACTUALIZA AQUÍ Y EN EL SERVER
    const fileInput = document.getElementById('file-input');
    const fileListDiv = document.getElementById('file-list');

    // SENSOR DE VERSIÓN
    function checkVersion() {
        fetch('/api/version')
            .then(res => res.json())
            .then(data => {
                if (data.version !== APP_VERSION) {
                    document.getElementById('version-lock').style.display = 'flex';
                    document.getElementById('version-msg').innerText = `Tu v${APP_VERSION} es antigua. Servidor corre v${data.version}`;
                }
            })
            .catch(e => console.log("Error de enlace v-sync"));
    }

    function getIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if(['apk'].includes(ext)) return '🤖';
        if(['jpg','jpeg','png','gif'].includes(ext)) return '🖼️';
        if(['mp3','wav'].includes(ext)) return '🎵';
        if(['mp4','3gp'].includes(ext)) return '🎬';
        if(['zip','rar','7z'].includes(ext)) return '📦';
        return '📄';
    }

    fileInput.onchange = function() {
        const file = fileInput.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append('archivo', file);

        document.getElementById('progress-container').style.display = 'block';
        const bar = document.getElementById('bar');

        const xhr = new XMLHttpRequest();
        xhr.open('POST', '/api/upload', true);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                bar.style.width = percent + '%';
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                location.reload();
            } else {
                const res = JSON.parse(xhr.responseText || '{"error":"Desconocido"}');
                alert('Fallo orbital: ' + res.error);
            }
        };
        xhr.send(formData);
    };

    // Cargar Archivos
    fetch('/api/files')
        .then(res => res.json())
        .then(files => {
            if(files.length === 0) {
                fileListDiv.innerHTML = '<p style="text-align:center; color:#555; font-size:12px;">Órbita vacía.</p>';
                return;
            }
            files.forEach(f => {
                fileListDiv.innerHTML += `
                    <div class="file-item">
                        <div class="file-info">
                            <span class="file-icon">${getIcon(f.name)}</span>
                            <div>
                                <div class="file-name">${f.name}</div>
                                <div class="file-meta">${f.size || '---'}</div>
                            </div>
                        </div>
                        <a href="${f.url}" class="btn-download" target="_blank">Bajar</a>
                    </div>
                `;
            });
        });

    checkVersion();
</script>
</body>
</html>
