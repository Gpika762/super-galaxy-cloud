<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Galaxy Cloud Pro</title>
    <style>
        :root { 
            --aero-blue: #0094ff; 
            --aero-glow: rgba(0, 148, 255, 0.6);
            --glass: rgba(255, 255, 255, 0.1); 
        }
        
        body { 
            background: #000; 
            background-image: 
                radial-gradient(circle at 20% 30%, #001a33 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, #003366 0%, #000 100%);
            color: white; 
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 20px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .container {
            width: 100%; max-width: 500px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 30px; padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.05);
        }

        h1 { 
            text-align: center; font-weight: 200; letter-spacing: 4px; 
            margin: 0 0 30px; font-size: 24px;
            text-shadow: 0 0 15px var(--aero-glow);
        }

        h1 span { font-weight: 800; color: var(--aero-blue); }

        .upload-card {
            background: rgba(255,255,255,0.03); 
            border: 1.5px dashed rgba(255,255,255,0.3);
            border-radius: 20px; padding: 40px 20px; text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; margin-bottom: 30px;
            position: relative; overflow: hidden;
        }

        .upload-card:hover { 
            background: rgba(0, 148, 255, 0.1); 
            border-color: var(--aero-blue);
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(0, 148, 255, 0.2);
        }

        .upload-card span { font-size: 50px; display: block; filter: drop-shadow(0 0 10px var(--aero-blue)); }

        .file-list { display: flex; flex-direction: column; gap: 15px; max-height: 400px; overflow-y: auto; padding-right: 5px; }
        
        .file-list::-webkit-scrollbar { width: 5px; }
        .file-list::-webkit-scrollbar-thumb { background: var(--glass); border-radius: 10px; }

        .file-item {
            background: rgba(255,255,255,0.07);
            border-radius: 15px; padding: 15px;
            display: flex; align-items: center; justify-content: space-between;
            border: 1px solid rgba(255,255,255,0.1);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .file-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { font-size: 28px; }
        .file-name { font-weight: 400; font-size: 14px; color: #eee; width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-meta { font-size: 11px; color: #888; margin-top: 3px; }

        .btn-download {
            background: linear-gradient(135deg, #0094ff 0%, #004080 100%);
            color: white; border: none; padding: 10px 18px;
            border-radius: 12px; font-weight: 600; cursor: pointer;
            text-decoration: none; font-size: 11px; text-transform: uppercase;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.3s;
        }

        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--aero-glow); }

        #progress-container { display: none; margin-top: 20px; }
        .progress-bar { width: 100%; background: rgba(255,255,255,0.1); height: 6px; border-radius: 10px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--aero-blue); box-shadow: 0 0 10px var(--aero-blue); transition: width 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1>GALAXY CLOUD <span>PRO</span></h1>

    <div class="upload-card" onclick="document.getElementById('file-input').click()">
        <span>🛸</span>
        <p style="margin: 15px 0 0; font-size: 13px; color: #ccc;">Lanzar archivo a la órbita</p>
        <input type="file" id="file-input" style="display: none;">
        
        <div id="progress-container">
            <div class="file-meta" id="status" style="margin-bottom: 8px;">Sincronizando...</div>
            <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
        </div>
    </div>

    <div id="file-list" class="file-list">
        <p style="text-align:center; color:#555; font-size:13px;">Buscando señales...</p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const fileListDiv = document.getElementById('file-list');

    function getIcon(filename) {
        const ext = filename.split('.').pop().toLowerCase();
        if(['apk'].includes(ext)) return '🤖';
        if(['jpg','jpeg','png','gif'].includes(ext)) return '🖼️';
        if(['mp3','wav'].includes(ext)) return '🎵';
        if(['mp4','3gp'].includes(ext)) return '🎬';
        if(['zip','rar','7z'].includes(ext)) return '📦';
        return '📄';
    }

    fileInput.onchange = function() {
        const file = fileInput.files[0];
        if(!file) return;

        const formData = new FormData();
        formData.append('archivo', file);

        document.getElementById('progress-container').style.display = 'block';
        const bar = document.getElementById('bar');

        const xhr = new XMLHttpRequest();
        // CAMBIO CLAVE: Quitamos la barra inicial para que sea ruta relativa
        xhr.open('POST', 'api/upload', true);

        xhr.upload.onprogress = (e) => {
            if (e.lengthComputable) {
                const percent = (e.loaded / e.total) * 100;
                bar.style.width = percent + '%';
            }
        };

        xhr.onload = function() {
            if (xhr.status === 200) {
                alert('🚀 ¡Misión cumplida! Archivo en órbita.');
                location.reload();
            } else {
                let errorMsg = "Error desconocido";
                try {
                    const res = JSON.parse(xhr.responseText);
                    errorMsg = res.error || xhr.statusText;
                } catch(e) {
                    errorMsg = "Servidor no responde";
                }
                alert('⚠️ FALLO ORBITAL: ' + errorMsg);
            }
        };

        xhr.send(formData);
    };

    // CAMBIO CLAVE: Ruta relativa para listar archivos
    fetch('api/files')
        .then(res => res.json())
        .then(files => {
            fileListDiv.innerHTML = '';
            if(!files || files.length === 0) {
                fileListDiv.innerHTML = '<p style="text-align:center; color:#555; font-size:13px;">Órbita vacía. Esperando señales...</p>';
                return;
            }
            files.forEach(f => {
                fileListDiv.innerHTML += `
                    <div class="file-item">
                        <div class="file-info">
                            <span class="file-icon">${getIcon(f.name)}</span>
                            <div>
                                <div class="file-name">${f.name}</div>
                                <div class="file-meta">${f.size || '---'}</div>
                            </div>
                        </div>
                        <a href="${f.url}" class="btn-download" target="_blank">Bajar</a>
                    </div>
                `;
            });
        })
        .catch(err => {
            fileListDiv.innerHTML = '<p style="text-align:center; color:red; font-size:13px;">Error de antena: No se pudo conectar.</p>';
        });
</script>

</body>
</html>
